
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>License Plate Tracker</title>
<style>
body{margin:0;font-family:Arial;background:#ececec;padding-bottom:80px}
header{background:#0d47a1;color:#fff;text-align:center;padding:20px}
#stats{margin-top:10px;font-size:20px}
button{padding:10px 18px;border:none;border-radius:8px;cursor:pointer}
#reset{background:#ff5252;color:#fff}
#plates{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:18px;padding:20px}
.plate{height:95px;border:5px solid #222;border-radius:12px;position:relative;overflow:hidden;cursor:pointer}
.top{height:22px}.middle{height:53px}.bottom{height:20px}
.stateName{position:absolute;bottom:5px;width:100%;text-align:center;font-weight:bold}
.seen{outline:6px solid limegreen}.check{display:none;position:absolute;top:4px;right:8px}.seen .check{display:block}
#bottomMenu{position:fixed;left:0;right:0;bottom:0;display:flex;background:#fff;box-shadow:0 -2px 8px rgba(0,0,0,.2)}
.menuBtn{flex:1;border-radius:0;padding:18px}.active{background:#0d47a1;color:#fff}
</style></head><body>
<header><h1>🚗 License Plate Tracker</h1><div id="stats"></div><button id="reset" onclick="resetTracker()">Reset Progress</button></header>
<div id="plates"></div>
<div id="bottomMenu"><button class="menuBtn active" onclick="showCountry('us',this)">🇺🇸 United States</button><button class="menuBtn" onclick="showCountry('ca',this)">🇨🇦 Canada</button></div>
<script>
const us=["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming","Washington D.C."];
const ca=["Ontario","British Columbia","Saskatchewan","Yukon Terr.","Quebec","Prince Edward Island","Alberta","Nunavut","Northwest Terr.","Manitoba","New Brunswick","Nova Scotia","Newfoundland & Labrador"];
const cols=[["#002868","#fff","#bf0a30"],["#2e7d32","#fff59d","#1565c0"],["#0d47a1","#90caf9","#fff"],["#ef6c00","#ffe082","#8d6e63"],["#880e4f","#f8bbd0","#fff"],["#4caf50","#fff","#1976d2"],["#5d4037","#d7ccc8","#fff"],["#00838f","#80deea","#fff"],["#6a1b9a","#ce93d8","#fff"],["#1565c0","#fff","#43a047"],["#D52B1E","#fff","#D52B1E"],["#003DA5","#fff","#009F4D"],["#009639","#fff","#FFD100"]];
let seen=JSON.parse(localStorage.getItem("seenStates")||"[]"),current="us";
const cont=document.getElementById("plates");
function build(list){cont.innerHTML="";list.forEach((n,i)=>{let c=cols[i%cols.length],d=document.createElement("div");d.className="plate"+(seen.includes(n)?" seen":"");d.innerHTML=`<div class=top style="background:${c[0]}"></div><div class=middle style="background:${c[1]}"></div><div class=bottom style="background:${c[2]}"></div><div class=stateName>${n}</div><div class=check>✔️</div>`;d.onclick=()=>{d.classList.toggle("seen");if(d.classList.contains("seen")){if(!seen.includes(n))seen.push(n)}else seen=seen.filter(x=>x!=n);localStorage.setItem("seenStates",JSON.stringify(seen));stats()};cont.appendChild(d)});stats()}
function stats(){let list=current=="us"?us:ca;document.getElementById("stats").textContent=`${list.filter(x=>seen.includes(x)).length} / ${list.length} Seen`;}
function showCountry(c,b){current=c;document.querySelectorAll(".menuBtn").forEach(x=>x.classList.remove("active"));b.classList.add("active");build(c=="us"?us:ca)}
function resetTracker(){if(confirm("Reset all progress?")){seen=[];localStorage.removeItem("seenStates");build(current=="us"?us:ca)}}
build(us);
</script></body></html>
